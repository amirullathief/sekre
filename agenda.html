<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda - Sekretaris KKN</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div id="app" class="app">
    <main class="main-content">
      <div class="items-header">
        <div class="page-header" style="margin-bottom:0">
          <h1>Kalender KKN</h1>
          <p>Agenda & Kegiatan Harian (1 Juni - 15 Juli 2026)</p>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> Tambah Agenda</button>
        </div>
      </div>

      <!-- Month Selector Tabs -->
      <div class="tabs" id="monthTabs" style="margin-top: 20px;">
        <button class="tab active" onclick="switchMonth(6)">Juni 2026</button>
        <button class="tab" onclick="switchMonth(7)">Juli 2026</button>
      </div>

      <!-- Calendar Container -->
      <div class="calendar-container">
        <div class="calendar-grid">
          <!-- Weekday Labels -->
          <div class="calendar-day-label">Sen</div>
          <div class="calendar-day-label">Sel</div>
          <div class="calendar-day-label">Rab</div>
          <div class="calendar-day-label">Kam</div>
          <div class="calendar-day-label">Jum</div>
          <div class="calendar-day-label">Sab</div>
          <div class="calendar-day-label">Min</div>
        </div>
        <div class="calendar-grid" id="calendarCells" style="margin-top: 8px;">
          <!-- Cells will be generated here -->
          <div class="loading" style="grid-column: 1/-1;"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Day Details Panel -->
      <div class="day-details-panel" id="dayDetailsPanel" style="display:none;">
        <div class="items-header" style="border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px;">
          <h3 id="detailsDateLabel">Jadwal pada 1 Juni 2026</h3>
          <span class="badge badge-gold" id="detailsCountLabel">0 Acara</span>
        </div>
        <div class="items-list" id="dayDetailsList">
          <!-- Daily items (kegiatan + agenda) will be loaded here -->
        </div>
      </div>

    </main>
  </div>

  <!-- MODAL TAMBAH AGENDA -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Tambah Agenda</h2>
        <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
      </div>
      <form onsubmit="saveAgenda(event)">
        <div class="modal-body">
          <div class="form-group">
            <label>Judul Agenda</label>
            <input type="text" id="fJudul" class="form-control" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Tanggal</label>
              <input type="date" id="fTanggal" class="form-control" min="2026-06-01" max="2026-07-15" required>
            </div>
            <div class="form-group">
              <label>Waktu</label>
              <input type="time" id="fWaktu" class="form-control">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Jenis</label>
              <select id="fJenis" class="form-control">
                <option value="rapat">Rapat</option>
                <option value="acara">Acara</option>
                <option value="kerja">Kerja Lapangan</option>
                <option value="lainnya">Lainnya</option>
              </select>
            </div>
            <div class="form-group">
              <label>Status</label>
              <select id="fStatus" class="form-control">
                <option value="upcoming">Mendatang</option>
                <option value="selesai">Selesai</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Lokasi</label>
            <input type="text" id="fLokasi" class="form-control">
          </div>
          <div class="form-group">
            <label>Deskripsi</label>
            <textarea id="fDeskripsi" class="form-control"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeModal()">Batal</button>
          <button type="submit" class="btn btn-primary" id="saveBtn">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/agenda.js"></script>
</body>
</html>
