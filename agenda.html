<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda - Sekretaris KKN</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div id="app" class="app">
    <main class="main-content">
      <div class="items-header">
        <div class="page-header" style="margin-bottom:0">
          <h1>Agenda</h1>
          <p>Jadwal kegiatan & rapat mendatang</p>
        </div>
        <button class="btn btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> Tambah</button>
      </div>
      <div class="tabs" id="agendaTabs">
        <button class="tab active" onclick="filterAgenda('semua')">Semua</button>
        <button class="tab" onclick="filterAgenda('upcoming')">Mendatang</button>
        <button class="tab" onclick="filterAgenda('selesai')">Selesai</button>
      </div>
      <div class="items-list" id="agendaList">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Tambah Agenda</h2>
        <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
      </div>
      <form onsubmit="saveAgenda(event)">
        <div class="modal-body">
          <div class="form-group">
            <label>Judul</label>
            <input type="text" id="fJudul" class="form-control" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Tanggal</label>
              <input type="date" id="fTanggal" class="form-control" required>
            </div>
            <div class="form-group">
              <label>Waktu</label>
              <input type="time" id="fWaktu" class="form-control">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Jenis</label>
              <select id="fJenis" class="form-control">
                <option value="rapat">Rapat</option>
                <option value="acara">Acara</option>
                <option value="kerja">Kerja Lapangan</option>
                <option value="lainnya">Lainnya</option>
              </select>
            </div>
            <div class="form-group">
              <label>Status</label>
              <select id="fStatus" class="form-control">
                <option value="upcoming">Mendatang</option>
                <option value="selesai">Selesai</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Lokasi</label>
            <input type="text" id="fLokasi" class="form-control">
          </div>
          <div class="form-group">
            <label>Deskripsi</label>
            <textarea id="fDeskripsi" class="form-control"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeModal()">Batal</button>
          <button type="submit" class="btn btn-primary" id="saveBtn">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/agenda.js"></script>
</body>
</html>
