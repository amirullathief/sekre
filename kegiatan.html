<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kegiatan - Sekretaris KKN</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div id="app" class="app">
    <main class="main-content">
      <div class="items-header">
        <div class="page-header" style="margin-bottom:0">
          <h1>Kegiatan Harian</h1>
          <p>Catatan kegiatan KKN sehari-hari</p>
        </div>
        <button class="btn btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> Tambah</button>
      </div>
      <div class="items-list" id="kegiatanList">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </main>
  </div>

  <!-- MODAL TAMBAH -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Tambah Kegiatan</h2>
        <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
      </div>
      <form onsubmit="saveKegiatan(event)">
        <div class="modal-body">
          <div class="form-group">
            <label>Judul Kegiatan</label>
            <input type="text" id="fJudul" class="form-control" placeholder="Judul kegiatan" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Tanggal</label>
              <input type="date" id="fTanggal" class="form-control" required>
            </div>
            <div class="form-group">
              <label>Kategori</label>
              <select id="fKategori" class="form-control">
                <option value="umum">Umum</option>
                <option value="sosial">Sosial</option>
                <option value="pendidikan">Pendidikan</option>
                <option value="keagamaan">Keagamaan</option>
                <option value="infrastruktur">Infrastruktur</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Lokasi</label>
            <input type="text" id="fLokasi" class="form-control" placeholder="Lokasi kegiatan">
          </div>
          <div class="form-group">
            <label>Deskripsi</label>
            <textarea id="fDeskripsi" class="form-control" placeholder="Deskripsi kegiatan"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeModal()">Batal</button>
          <button type="submit" class="btn btn-primary" id="saveBtn">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/kegiatan.js"></script>
</body>
</html>
