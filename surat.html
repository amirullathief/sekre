<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surat - Sekretaris KKN</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div id="app" class="app">
    <main class="main-content">
      <div class="items-header">
        <div class="page-header" style="margin-bottom:0">
          <h1>Surat</h1>
          <p>Arsip surat masuk & keluar</p>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-outline" onclick="exportPDF()"><i class="fas fa-file-pdf"></i> Export</button>
          <button class="btn btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> Tambah</button>
        </div>
      </div>
      <div class="tabs" id="suratTabs">
        <button class="tab active" onclick="filterSurat('semua')">Semua</button>
        <button class="tab" onclick="filterSurat('masuk')">Masuk</button>
        <button class="tab" onclick="filterSurat('keluar')">Keluar</button>
      </div>
      <div class="items-list" id="suratList">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Tambah Surat</h2>
        <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
      </div>
      <form onsubmit="saveSurat(event)">
        <div class="modal-body">
          <div class="form-row">
            <div class="form-group">
              <label>Jenis</label>
              <select id="fJenis" class="form-control" required>
                <option value="masuk">Surat Masuk</option>
                <option value="keluar">Surat Keluar</option>
              </select>
            </div>
            <div class="form-group">
              <label>Nomor Surat</label>
              <input type="text" id="fNomor" class="form-control" placeholder="No. surat">
            </div>
          </div>
          <div class="form-group">
            <label>Perihal</label>
            <input type="text" id="fPerihal" class="form-control" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Pengirim</label>
              <input type="text" id="fPengirim" class="form-control">
            </div>
            <div class="form-group">
              <label>Penerima</label>
              <input type="text" id="fPenerima" class="form-control">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Tanggal</label>
              <input type="date" id="fTanggal" class="form-control" required>
            </div>
            <div class="form-group">
              <label>Status</label>
              <select id="fStatus" class="form-control">
                <option value="diproses">Diproses</option>
                <option value="selesai">Selesai</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeModal()">Batal</button>
          <button type="submit" class="btn btn-primary" id="saveBtn">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/surat.js"></script>
</body>
</html>
