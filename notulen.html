<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notulen - Sekretaris KKN</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div id="app" class="app">
    <main class="main-content">
      <div class="items-header">
        <div class="page-header" style="margin-bottom:0">
          <h1>Notulen Rapat</h1>
          <p>Catatan hasil rapat & keputusan</p>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-outline" onclick="exportAllPDF()"><i class="fas fa-file-pdf"></i> Export PDF</button>
          <button class="btn btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> Tambah</button>
        </div>
      </div>
      <div class="items-list" id="notulenList">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Tambah Notulen</h2>
        <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
      </div>
      <form onsubmit="saveNotulen(event)">
        <div class="modal-body">
          <div class="form-group">
            <label>Judul Rapat</label>
            <input type="text" id="fJudul" class="form-control" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Tanggal</label>
              <input type="date" id="fTanggal" class="form-control" required>
            </div>
            <div class="form-group">
              <label>Waktu</label>
              <input type="time" id="fWaktu" class="form-control">
            </div>
          </div>
          <div class="form-group">
            <label>Lokasi</label>
            <input type="text" id="fLokasi" class="form-control">
          </div>
          <div class="form-group">
            <label>Peserta</label>
            <textarea id="fPeserta" class="form-control" rows="2" placeholder="Daftar peserta rapat"></textarea>
          </div>
          <div class="form-group">
            <label>Pembahasan</label>
            <textarea id="fPembahasan" class="form-control" rows="3" placeholder="Isi pembahasan rapat"></textarea>
          </div>
          <div class="form-group">
            <label>Keputusan</label>
            <textarea id="fKeputusan" class="form-control" rows="3" placeholder="Keputusan yang diambil"></textarea>
          </div>
          <div class="form-group">
            <label>Tindak Lanjut</label>
            <textarea id="fTindakLanjut" class="form-control" rows="2" placeholder="Tindak lanjut / PIC"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeModal()">Batal</button>
          <button type="submit" class="btn btn-primary" id="saveBtn">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal" style="max-width:640px">
      <div class="modal-header">
        <h2 id="detailTitle">Detail Notulen</h2>
        <button class="modal-close" onclick="closeDetail()"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body" id="detailBody"></div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeDetail()">Tutup</button>
        <button class="btn btn-primary" id="exportSingleBtn" onclick="exportSinglePDF()"><i class="fas fa-file-pdf"></i> Export PDF</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/notulen.js"></script>
</body>
</html>
