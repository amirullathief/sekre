<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Sekretaris KKN</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div id="app" class="app">
    <main class="main-content">
      <div class="page-header">
        <h1>Dashboard</h1>
        <p id="welcomeText">Selamat datang!</p>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon gold"><i class="fas fa-calendar-check"></i></div>
          <div class="stat-value" id="totalKegiatan">0</div>
          <div class="stat-label">Kegiatan</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon blue"><i class="fas fa-calendar-alt"></i></div>
          <div class="stat-value" id="totalAgenda">0</div>
          <div class="stat-label">Agenda</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green"><i class="fas fa-file-alt"></i></div>
          <div class="stat-value" id="totalNotulen">0</div>
          <div class="stat-label">Notulen</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon red"><i class="fas fa-envelope"></i></div>
          <div class="stat-value" id="totalSurat">0</div>
          <div class="stat-label">Surat</div>
        </div>
      </div>

      <div class="items-header">
        <h2>Agenda Mendatang</h2>
        <a href="agenda.html" class="btn btn-outline btn-sm"><i class="fas fa-arrow-right"></i> Lihat Semua</a>
      </div>
      <div class="items-list" id="upcomingAgenda">
        <div class="loading"><div class="spinner"></div></div>
      </div>


    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
